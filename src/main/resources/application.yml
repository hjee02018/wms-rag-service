      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:oracle:thin:@//hmx-logisol-oracle-db-dev.c5ruasqdgoz7.ap-northeast-2.rds.amazonaws.com:1521/OHMXDB
    username: dbadmin
    password: HyundaiSol2023!
    driver-class-name: oracle.jdbc.OracleDriver
