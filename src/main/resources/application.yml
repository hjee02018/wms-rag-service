server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: wms-rag-service

  profiles:
    active: groq    # ← 여기서 groq / ollama / gemini 전환

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:oracle:thin:@//hmx-logisol-oracle-db-dev.c5ruasqdgoz7.ap-northeast-2.rds.amazonaws.com:1521/OHMXDB
    username: dbadmin
    password: HyundaiSol2023!
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

  mvc:
    async:
      request-timeout: 300000

  vectorstore:
    chroma:
      client:
        base-url: http://localhost:8000
      collection-name: wms-rag
      initialize-schema: true

logging:
  charset:
    console: UTF-8