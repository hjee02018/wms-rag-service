spring:
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.3

    # 임베딩은 로컬 Ollama 유지
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text